<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body flex-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5 auth-panel">
                    <h2 class="text-center fw-bold text-white mb-4">Welcome Back</h2>
                    
                    <ul class="nav nav-pills mb-4 justify-content-center custom-tabs" id="pills-tab" role="tablist">
                      <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Login</button>
                      </li>
                      <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Register</button>
                      </li>
                    </ul>

                    <div class="tab-content" id="pills-tabContent">
                      <!-- Login Form -->
                      <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                          <form id="loginForm">
                              <div class="mb-3">
                                  <label class="form-label text-light">Email address</label>
                                  <input type="email" class="form-control glass-input" id="loginEmail" required>
                              </div>
                              <div class="mb-4">
                                  <label class="form-label text-light">Password</label>
                                  <input type="password" class="form-control glass-input" id="loginPassword" required>
                              </div>
                              <div id="loginError" class="text-danger small mb-2 d-none"></div>
                              <button type="submit" class="btn btn-accent w-100">Sign In</button>
                          </form>
                      </div>

                      <!-- Register Form -->
                      <div class="tab-pane fade" id="pills-register" role="tabpanel">
                          <form id="registerForm">
                              <div class="mb-3">
                                  <label class="form-label text-light">Full Name</label>
                                  <input type="text" class="form-control glass-input" id="regName" required>
                              </div>
                              <div class="mb-3">
                                  <label class="form-label text-light">Email address</label>
                                  <input type="email" class="form-control glass-input" id="regEmail" required>
                              </div>
                              <div class="mb-4">
                                  <label class="form-label text-light">Password</label>
                                  <input type="password" class="form-control glass-input" id="regPassword" required>
                              </div>
                              <div id="regError" class="text-danger small mb-2 d-none"></div>
                              <button type="submit" class="btn btn-accent w-100">Create Account</button>
                          </form>
                      </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
