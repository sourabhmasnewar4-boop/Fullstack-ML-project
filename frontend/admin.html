<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | NeuroDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg nav-glass fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold ms-3" href="#">Neuro<span class="text-accent">Detect</span> <span class="badge bg-danger ms-2">Admin Panel</span></a>
            <div class="d-flex me-3">
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 pb-5">
        <h2 class="fw-bold mb-4">System Overview</h2>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="glass-panel p-4 text-center dashboard-card">
                    <h1 class="display-4 text-accent fw-bold" id="totalUsers">-</h1>
                    <p class="text-secondary mb-0">Total Active Users</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-panel p-4 text-center dashboard-card">
                    <h1 class="display-4 text-white fw-bold" id="totalPredictions">-</h1>
                    <p class="text-secondary mb-0">Total Predictions Handled</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-panel p-4 text-center dashboard-card">
                    <h1 class="display-4 text-danger fw-bold" id="highRiskCases">-</h1>
                    <p class="text-secondary mb-0">High-Risk Detections</p>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4">
            <h4 class="text-accent mb-4"><i class="bi bi-table"></i> Recent Activity Log</h4>
            <div class="table-responsive">
                <table class="table table-dark table-hover border-secondary">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User Name</th>
                            <th>Input Type</th>
                            <th>ML Confidence</th>
                            <th>Risk Level</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr><td colspan="5" class="text-center text-muted">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
